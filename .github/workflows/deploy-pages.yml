name: Deploy GitHub Pages

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Validate and build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install browser for mobile E2E
        run: npx playwright install --with-deps chromium

      - name: Validate quiz data
        run: npm run validate

      - name: Test runtime state
        run: npm run test:state

      - name: Test UI icons
        run: npm run test:icons

      - name: Test homepage progress
        run: npm run test:home

      - name: Test choice selection
        run: npm run test:choice

      - name: Test choice result state
        run: npm run test:choice-result

      - name: Test keyboard input guard
        run: npm run test:keyboard

      - name: Test text answer drafts
        run: npm run test:text-drafts

      - name: Test mobile browser interactions
        run: npm run test:mobile:e2e

      - name: Test learning data tools
        run: npm run test:learning-data

      - name: Test workflow surface
        run: npm run test:workflow

      - name: Test machine learning question quality
        run: npm run test:ml-quality

      - name: Test quiz UI CSS
        run: npm run test:quiz-ui

      - name: Build site
        run: npm run build

      - name: Check built startup order
        run: npm run check:startup

      - name: Upload Pages artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    name: Deploy
    if: github.event_name != 'pull_request'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
