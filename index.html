<!DOCTYPE html>
<html lang="zh-CN" data-theme="orange">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="assets/icons/site-icon.svg" type="image/svg+xml">
<title>腿毛人的练习网站</title>
<style>
/* ═══ 橙色暖色调（默认） ═══ */
[data-theme="orange"]{
  --bg:#fffaf3;--bg-card:#fff;--bg-card-hover:#fff;--bg-nav-item:#fff4eb;
  --border:#f0e1cf;--border-hover:#fdba74;--shadow:rgba(124,45,18,.08);
  --accent:#f97316;--accent-dark:#c2410c;--accent-light:#fff7ed;
  --text:#241810;--text-sub:#6f6258;--text-muted:#9a8d83;--text-footer:#b7aaa0;
  --icon-bg:#fff7ed;--icon-text:#c2410c;
}
/* ═══ 黑+墨绿色 ═══ */
[data-theme="green"]{
  --bg:#0a0f0a;--bg-card:#0f1a0f;--bg-card-hover:#0f1a0f;--bg-nav-item:#132a13;
  --border:#1a2e1a;--border-hover:#16a34a;--shadow:rgba(22,163,74,.1);
  --accent:#22c55e;--accent-dark:#4ade80;--accent-light:#132a13;
  --text:#eef5ee;--text-sub:#9aaa9a;--text-muted:#6f806f;--text-footer:#3c4a3c;
  --icon-bg:#132a13;--icon-text:#4ade80;
}
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Microsoft YaHei","PingFang SC",sans-serif;
  background:var(--bg);color:var(--text);min-height:100vh;
  display:flex;flex-direction:column;transition:background .3s,color .3s;
}
.ui-icon{width:1em;height:1em;display:block;flex:none}
/* 导航 */
.topnav{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 32px;max-width:1040px;width:100%;margin:0 auto;
}
.logo{display:flex;align-items:center;gap:10px;font-weight:800;font-size:18px;color:var(--text)}
.logo-icon{
  width:36px;height:36px;border-radius:10px;
  background:var(--icon-bg);display:flex;align-items:center;
  justify-content:center;font-size:20px;color:var(--icon-text);
  border:1px solid var(--border);
  transition:background .3s;
}
.logo-icon .ui-icon{width:24px;height:24px}
.nav-right{display:flex;align-items:center;gap:8px}
.nav-links{display:flex;gap:6px}
#subjectNav{display:contents}
.nav-links a{
  padding:6px 14px;border-radius:8px;font-size:13px;color:var(--text-muted);
  text-decoration:none;transition:.15s;
}
.nav-links a:hover{background:var(--bg-nav-item);color:var(--accent-dark)}
.nav-links a.active{background:var(--bg-nav-item);color:var(--accent-dark);font-weight:600}
/* 主题切换按钮 */
.theme-toggle{
  width:36px;height:36px;border-radius:10px;border:1px solid var(--border);
  background:var(--bg-card);cursor:pointer;display:flex;align-items:center;
  justify-content:center;font-size:17px;transition:.2s;color:var(--accent-dark);
}
.theme-toggle:hover{border-color:var(--accent);transform:scale(1.05)}
.theme-toggle:focus-visible,.card:focus-visible,.nav-links a:focus-visible{outline:2px solid var(--accent);outline-offset:3px}
/* Hero */
.hero{
  text-align:center;padding:34px 20px 24px;max-width:1040px;margin:0 auto;width:100%;
}
.hero-badge{
  display:inline-block;padding:4px 14px;border-radius:20px;
  background:var(--accent-light);color:var(--accent-dark);
  font-size:12px;font-weight:600;border:1px solid var(--border);
  transition:all .3s;
}
h1{
  font-size:38px;font-weight:900;letter-spacing:0;
  line-height:1.18;margin:14px 0 10px;color:var(--text);
}
h1 .accent{color:var(--accent);transition:color .3s}
.subtitle{color:var(--text-sub);font-size:16px;line-height:1.7;max-width:480px;margin:0 auto}
.stats{display:flex;gap:10px;justify-content:center;margin-top:22px;flex-wrap:wrap}
.stat{min-width:92px;text-align:center;padding:10px 14px;border:1px solid var(--border);border-radius:12px;background:var(--bg-card)}
.stat-num{font-size:24px;font-weight:800;color:var(--accent);transition:color .3s;font-variant-numeric:tabular-nums}
.stat-label{font-size:12px;color:var(--text-muted);margin-top:2px}
/* 继续练习 */
.console-panel{
  max-width:1040px;width:100%;margin:4px auto 24px;padding:0 20px;
}
.continue-card{
  display:grid;grid-template-columns:auto 1fr auto;gap:16px;align-items:center;
  background:var(--bg-card);border:1px solid var(--border);border-radius:14px;
  padding:18px 20px;color:var(--text);box-shadow:0 8px 24px var(--shadow);
}
.continue-card.empty{box-shadow:none;background:transparent}
.continue-icon{
  width:44px;height:44px;border-radius:12px;background:var(--accent-light);
  color:var(--accent-dark);border:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;font-size:23px;
}
.continue-kicker{font-size:12px;color:var(--text-muted);margin-bottom:4px}
.continue-title{font-size:18px;font-weight:800;margin-bottom:4px}
.continue-meta{font-size:13px;color:var(--text-sub);line-height:1.5}
.continue-action{
  display:inline-flex;align-items:center;gap:6px;white-space:nowrap;
  padding:10px 16px;border-radius:10px;background:var(--accent);
  color:#fff;text-decoration:none;font-size:13px;font-weight:700;
}
.continue-action:hover{background:var(--accent-dark)}
.mini-progress{height:5px;border-radius:999px;background:var(--accent-light);overflow:hidden;margin-top:10px}
.mini-progress span{display:block;height:100%;border-radius:inherit;background:var(--accent);transition:width .25s}
/* 学科卡片 */
.section-label{
  font-size:13px;color:var(--text-muted);letter-spacing:1px;margin-bottom:16px;
  max-width:1040px;margin:0 auto;width:100%;padding:0 20px;
  display:flex;align-items:center;gap:10px;margin-top:8px;
}
.section-label::after{content:'';flex:1;height:1px;background:var(--border)}
.cards{
  display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
  gap:16px;max-width:1040px;margin:0 auto;padding:0 20px 20px;width:100%;
}
.card{
  background:var(--bg-card);border:1px solid var(--border);border-radius:14px;
  padding:24px;cursor:pointer;transition:.2s;text-decoration:none;
  color:var(--text);display:flex;flex-direction:column;
}
.card:hover{
  transform:translateY(-2px);border-color:var(--border-hover);
  box-shadow:0 8px 24px var(--shadow);
}
.card-head{display:flex;align-items:center;gap:12px;margin-bottom:12px}
.card-icon{
  width:44px;height:44px;border-radius:12px;
  display:flex;align-items:center;justify-content:center;font-size:24px;
  color:var(--accent-dark);background:var(--accent-light);transition:background .3s;
  border:1px solid var(--border);
}
.card-name{font-size:17px;font-weight:700}
.card-desc{font-size:13px;color:var(--text-sub);line-height:1.7;margin-bottom:14px;flex:1}
.card-meta{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px;color:var(--text-muted);font-size:12px}
.card-meta span{padding:3px 8px;border-radius:7px;border:1px solid var(--border);background:var(--bg)}
.card-progress{margin-bottom:14px}
.card-progress-head{display:flex;justify-content:space-between;font-size:12px;color:var(--text-muted);margin-bottom:6px}
.card-progress-bar{height:5px;border-radius:999px;background:var(--accent-light);overflow:hidden}
.card-progress-bar span{display:block;height:100%;background:var(--accent);border-radius:inherit;transition:width .25s}
.card-tags{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:14px}
.tag{
  padding:2px 9px;border-radius:6px;font-size:11px;
  background:var(--accent-light);color:var(--accent-dark);transition:all .3s;
}
.card-go{
  display:flex;align-items:center;gap:6px;
  font-size:13px;color:var(--accent);font-weight:600;transition:color .3s;
}
.card-go .arrow{transition:.15s}
.card:hover .card-go .arrow{transform:translateX(3px)}
/* Footer */
.footer{
  margin-top:auto;padding:24px;text-align:center;
  font-size:12px;color:var(--text-footer);border-top:1px solid var(--border);
  transition:all .3s;
}
/* 响应式 */
@media(max-width:600px){
  h1{font-size:28px}
  .stats{gap:20px}
  .topnav{padding:12px 16px}
  .nav-links{display:none}
  .hero{padding-top:24px}
  .card{padding:20px}
  .continue-card{grid-template-columns:1fr;padding:18px}
  .continue-icon{display:none}
  .continue-action{justify-content:center}
}
</style>
<script>var _t=localStorage.getItem('quiz-hub-theme')||'orange';document.documentElement.setAttribute('data-theme',_t);</script>
</head>
<body>
  <div class="topnav">
    <div class="logo">
      <div class="logo-icon" id="brandIcon" aria-hidden="true"></div>
      腿毛人的练习网站
    </div>
    <div class="nav-right">
      <div class="nav-links">
        <a class="active" href="#">首页</a>
        <span id="subjectNav"></span>
      </div>
      <button class="theme-toggle" id="themeToggle" type="button" title="切换主题" aria-label="切换主题"></button>
    </div>
  </div>

  <div class="hero">
    <div class="hero-badge">QUIZ HUB</div>
    <h1>刷题不息<br><span class="accent">腿毛不止</span></h1>
    <p class="subtitle">每一次刷题，都是一根腿毛的觉醒。<br>选一门学科，开始今天的练习。</p>
    <div class="stats">
      <div class="stat"><div class="stat-num" id="subjectCount">0</div><div class="stat-label">学科</div></div>
      <div class="stat"><div class="stat-num" id="questionCount">0</div><div class="stat-label">题目</div></div>
      <div class="stat"><div class="stat-num" id="setCount">0</div><div class="stat-label">套卷</div></div>
    </div>
  </div>

  <div class="console-panel" id="continuePanel"></div>

  <div class="section-label">选择学科</div>
  <div class="cards" id="subjectCards"></div>

  <div class="footer">© 2025 腿毛人 · Quiz Hub</div>

<script>
var current = localStorage.getItem('quiz-hub-theme') || 'orange';
</script>
<script type="module">
import { SUBJECTS } from './subjects/subjects.js';
import { iconMarkup } from './js/icons.js';
import { pickContinueSubject, summarizeAllSubjects } from './js/home-progress.js';

var subjectNav = document.getElementById('subjectNav');
var subjectCards = document.getElementById('subjectCards');
var themeToggle = document.getElementById('themeToggle');
var continuePanel = document.getElementById('continuePanel');
var subjectSummaries = summarizeAllSubjects(SUBJECTS, localStorage);
var continueSubject = pickContinueSubject(subjectSummaries);

document.getElementById('brandIcon').innerHTML = iconMarkup('siteMark');

function applyTheme(t) {
  document.documentElement.setAttribute('data-theme', t);
  themeToggle.innerHTML = iconMarkup(t === 'orange' ? 'themeBroccoli' : 'themeCarrot');
  themeToggle.title = t === 'orange' ? '切换到绿色主题' : '切换到橙色主题';
  themeToggle.setAttribute('aria-label', themeToggle.title);
  localStorage.setItem('quiz-hub-theme', t);
  current = t;
}

themeToggle.addEventListener('click', function () {
  applyTheme(current === 'orange' ? 'green' : 'orange');
});

applyTheme(current);

document.getElementById('subjectCount').textContent = SUBJECTS.length;
document.getElementById('questionCount').textContent = SUBJECTS.reduce(function (sum, subject) {
  return sum + (subject.questionCount || 0);
}, 0);
document.getElementById('setCount').textContent = SUBJECTS.reduce(function (sum, subject) {
  return sum + (subject.setCount || 0);
}, 0);

function renderContinuePanel(summary) {
  if (!summary) {
    continuePanel.innerHTML = [
      '<div class="continue-card empty">',
      '<div class="continue-icon">' + iconMarkup('brandMark') + '</div>',
      '<div>',
      '<div class="continue-kicker">今日入口</div>',
      '<div class="continue-title">选择一门学科开始练习</div>',
      '<div class="continue-meta">进度会自动保存在当前浏览器。下次回来，这里会出现继续练习入口。</div>',
      '</div>',
      '<a class="continue-action" href="#subjectCards">查看学科</a>',
      '</div>'
    ].join('');
    return;
  }
  continuePanel.innerHTML = [
    '<div class="continue-card">',
    '<div class="continue-icon">' + iconMarkup(summary.icon) + '</div>',
    '<div>',
    '<div class="continue-kicker">继续上次练习</div>',
    '<div class="continue-title">' + summary.name + '</div>',
    '<div class="continue-meta">' + summary.activeSetName + ' · 第 ' + summary.currentQuestion + ' 题 · 已完成 ' + summary.doneCount + ' / ' + summary.totalCount + ' · 时长 ' + summary.practiceLabel + '</div>',
    '<div class="mini-progress" aria-hidden="true"><span style="width:' + summary.percent + '%"></span></div>',
    '</div>',
    '<a class="continue-action" href="' + summary.homeHref + '">继续练习</a>',
    '</div>'
  ].join('');
}

renderContinuePanel(continueSubject);

subjectSummaries.forEach(function (subject) {
  var navLink = document.createElement('a');
  navLink.href = subject.homeHref;
  navLink.textContent = subject.name;
  subjectNav.appendChild(navLink);

  var card = document.createElement('a');
  card.className = 'card';
  card.href = subject.homeHref;

  var head = document.createElement('div');
  head.className = 'card-head';

  var icon = document.createElement('div');
  icon.className = 'card-icon';
  icon.innerHTML = iconMarkup(subject.icon);

  var name = document.createElement('div');
  name.className = 'card-name';
  name.textContent = subject.name;

  head.appendChild(icon);
  head.appendChild(name);

  var desc = document.createElement('div');
  desc.className = 'card-desc';
  desc.textContent = subject.description || '';

  var meta = document.createElement('div');
  meta.className = 'card-meta';
  var questionMeta = document.createElement('span');
  questionMeta.textContent = (subject.questionCount || 0) + ' 题';
  var setMeta = document.createElement('span');
  setMeta.textContent = (subject.setCount || 0) + ' 套题组';
  meta.appendChild(questionMeta);
  meta.appendChild(setMeta);

  var tags = document.createElement('div');
  tags.className = 'card-tags';
  (subject.tags || []).forEach(function (tagText) {
    var tag = document.createElement('span');
    tag.className = 'tag';
    tag.textContent = tagText;
    tags.appendChild(tag);
  });

  var go = document.createElement('div');
  go.className = 'card-go';
  go.appendChild(document.createTextNode('开始练习 '));
  var arrow = document.createElement('span');
  arrow.className = 'arrow';
  arrow.textContent = '→';
  go.appendChild(arrow);

  card.appendChild(head);
  card.appendChild(desc);
  card.appendChild(meta);
  var progress = document.createElement('div');
  progress.className = 'card-progress';
  progress.innerHTML = '<div class="card-progress-head"><span>本地进度</span><span>' + subject.doneCount + '/' + subject.totalCount + ' · ' + subject.percent + '%</span></div><div class="card-progress-bar" aria-hidden="true"><span style="width:' + subject.percent + '%"></span></div>';
  card.appendChild(progress);
  card.appendChild(tags);
  card.appendChild(go);
  subjectCards.appendChild(card);
});
</script>
</body>
</html>
